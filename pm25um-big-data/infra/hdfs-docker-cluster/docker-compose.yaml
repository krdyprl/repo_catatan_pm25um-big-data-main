  # spark-worker:
  #   image: apache/spark:4.0.1-scala2.13-java17-python3-ubuntu
  #   container_name: spark-worker
  #   depends_on:
  #     - spark-master
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     - "SPARK_MASTER=spark://spark-master:7077"
  #   networks:
  #     - hdfs_network_bridge

  jupyter:
    image: quay.io/jupyter/pyspark-notebook
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    ports:
      - 8888:8888
    volumes:
      - ../../notebooks:/home/jovyan/work
      - ../../data:/home/jovyan/data
    networks:
      - hdfs_network_bridge

volumes:
  notebooks:
  data:

networks:
  hdfs_network_bridge:
    driver: bridge
